<!-- @dsCard group="Colors" viewport="700x150" name="Semântica funcional" subtitle="Aliases: ok · warn · risk · info" -->
<!DOCTYPE html>
<html lang="pt"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 18px; display: flex; gap: 10px; flex-wrap: wrap; }
  .chip { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 10px; background: var(--surface); box-shadow: var(--shadow-card); }
  .dot { width: 14px; height: 14px; border-radius: 5px; }
  .lab { font-size: 12px; color: var(--ink-2); }
  .lab b { display: block; font-family: var(--font-mono); font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500; }
</style></head>
<body>
  <div class="chip"><span class="dot" style="background:var(--ok)"></span><span class="lab"><b>--ok</b>concluído · sucesso</span></div>
  <div class="chip"><span class="dot" style="background:var(--warn)"></span><span class="lab"><b>--warn</b>atenção · prazo</span></div>
  <div class="chip"><span class="dot" style="background:var(--risk)"></span><span class="lab"><b>--risk</b>risco · urgente</span></div>
  <div class="chip"><span class="dot" style="background:var(--info)"></span><span class="lab"><b>--info</b>informação</span></div>
</body></html>
