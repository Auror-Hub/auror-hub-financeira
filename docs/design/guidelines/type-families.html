<!-- @dsCard group="Type" viewport="700x160" name="Famílias tipográficas" subtitle="Plus Jakarta Sans para tudo · DM Mono só em números" -->
<!DOCTYPE html>
<html lang="pt"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .spec b { display: block; font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .big-ui { font-family: var(--font-display); font-size: 30px; font-weight: 600; color: var(--ink); letter-spacing: -0.02em; }
  .big-mono { font-family: var(--font-mono); font-size: 28px; font-weight: 500; color: var(--ink); font-variant-numeric: tabular-nums; }
  .meta { font-size: 11px; color: var(--muted); margin-top: 6px; }
</style></head>
<body>
  <div class="spec">
    <b>--font-ui · Plus Jakarta Sans</b>
    <div class="big-ui">Ecossistema vivo</div>
    <div class="meta">400 corpo · 500 labels · 600 títulos · 700 KPI</div>
  </div>
  <div class="spec">
    <b>--font-mono · DM Mono</b>
    <div class="big-mono">1 234,56 €</div>
    <div class="meta">apenas valores numéricos e datas/horas</div>
  </div>
</body></html>
