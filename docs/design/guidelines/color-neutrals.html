<!-- @dsCard group="Colors" viewport="700x150" name="Superfícies & Tinta" subtitle="Linho quente, pedra clara, escala de tinta marrom-quente" -->
<!DOCTYPE html>
<html lang="pt"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 18px; }
  .swatches { display: flex; gap: 0; border-radius: 12px; overflow: hidden; box-shadow: var(--shadow-card); border: 1px solid var(--line-2); }
  .sw { flex: 1; height: 92px; display: flex; flex-direction: column; justify-content: flex-end; padding: 9px 10px; }
  .sw .n { font-size: 9px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; opacity: 0.78; }
  .sw .h { font-family: var(--font-mono); font-size: 10px; font-weight: 500; margin-top: 2px; }
</style></head>
<body>
<div class="swatches">
  <div class="sw" style="background:var(--page);color:var(--ink-2)"><span class="n">page</span><span class="h">#F4F1EC</span></div>
  <div class="sw" style="background:var(--surface);color:var(--ink-2)"><span class="n">surface</span><span class="h">#FDFCF9</span></div>
  <div class="sw" style="background:var(--surface-2);color:var(--ink-2)"><span class="n">surface-2</span><span class="h">#EDE9E1</span></div>
  <div class="sw" style="background:var(--ink);color:#F4F1EC"><span class="n">ink</span><span class="h">#1C1916</span></div>
  <div class="sw" style="background:var(--ink-2);color:#F4F1EC"><span class="n">ink-2</span><span class="h">#4A443C</span></div>
  <div class="sw" style="background:var(--muted);color:#FDFCF9"><span class="n">muted</span><span class="h">#8C8279</span></div>
  <div class="sw" style="background:var(--faint);color:var(--ink)"><span class="n">faint</span><span class="h">#C4BFBA</span></div>
</div>
</body></html>
