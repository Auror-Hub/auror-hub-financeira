<!-- @dsCard group="Type" viewport="700x150" name="Eyebrow & mono" subtitle="Eyebrow em Plus Jakarta Sans 500 · mono só em números" -->
<!DOCTYPE html>
<html lang="pt"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { padding: 22px; display: flex; flex-direction: column; gap: 16px; }
  .demo { display: flex; align-items: center; gap: 16px; }
  .desc { font-size: 11px; color: var(--muted); }
</style></head>
<body>
  <div class="demo">
    <span class="eyebrow">ECOSSISTEMA · PAINEL</span>
    <span class="desc">.eyebrow — Plus Jakarta Sans 500, 10px, uppercase, 0.1em</span>
  </div>
  <div class="demo">
    <span class="mono" style="font-size:13px;color:var(--ink-2)">98,6% · 24 ativos · 14:32 · há 4 min</span>
    <span class="desc">.mono — só valores numéricos e datas/horas</span>
  </div>
  <div class="demo">
    <span class="mono" style="font-size:20px;font-weight:500;color:var(--ink);font-variant-numeric:tabular-nums">12 480,00 €</span>
    <span class="desc">tabular-nums — alinhamento de valores</span>
  </div>
</body></html>
